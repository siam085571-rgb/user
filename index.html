<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমার লিংকসমূহ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 450px; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .links-wrapper { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .link-card { display: block; padding: 14px; background: #1e293b; color: #38bdf8; text-decoration: none; border-radius: 8px; font-weight: bold; border: 1px solid rgba(56, 189, 248, 0.2); transition: 0.2s; }
        .link-card:hover { background: #38bdf8; color: #0f172a; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="container">
        <h1>আমার প্রোফাইল লিংক</h1>
        <p style="color: #94a3b8; margin-top: 5px;">সবগুলো লিংক নিচে দেওয়া হলো</p>
        
        <div class="links-wrapper">
            <!-- START_LINKS -->
            <a href="https://github.com" target="_blank" class="link-card">গিটহাব (GitHub)</a>
            <!-- END_LINKS -->
        </div>
    </div>

</body>
</html>
